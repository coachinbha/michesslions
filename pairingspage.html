<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Pairings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #ffffff;
      --text:    #000000;
      --gray-100:#f8f8f8;
      --gray-200:#e5e5e5;
      --gray-400:#999999;
      --gray-600:#555555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .top-bar {
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1.25rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      gap: 0.6rem;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0; /* timestamp never shrinks */
    }

    .refresh-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .refresh-dot.active { opacity: 1; animation: pulse 1s ease-out; }

    @keyframes pulse {
      0%   { opacity: 1; transform: scale(1.5); }
      100% { opacity: 0.3; transform: scale(1); }
    }

    .top-bar-ts {
      font-size: 0.62rem;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-bar-filter-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }

    .top-bar-filter-btn:hover { background: rgba(255,255,255,0.15); }

    .site-header {
      border-bottom: 1px solid var(--gray-200);
      padding: 0.75rem 1.25rem 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .header-left { flex: 1; }

    .event-title {
      font-size: clamp(0.95rem, 4.5vw, 1.6rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    .event-meta {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--gray-400);
      line-height: 1.7;
      margin-top: 1px;
    }

    .event-meta span { color: var(--gray-600); }

    .filter-pill {
      display: none; /* hidden until data loads */
      align-items: center;
      gap: 0.35rem;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 0.28rem 0.6rem;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.35);
      font-family: 'Montserrat', sans-serif;
      flex-shrink: 1;
      min-width: 0;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }

    .filter-pill:hover { background: rgba(255,255,255,0.25); }

    .filter-pill-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter-pill .x { opacity: 0.55; flex-shrink: 0; margin-left: 1px; }

    /* Filter button: icon-only once pill is visible */
    .top-bar-filter-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1rem;
      line-height: 1;
      padding: 0.25rem 0.3rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .top-bar-filter-btn:hover { opacity: 1; }

    /* ── Section tabs — wraps to 2 rows, full names ── */
    .section-tabs {
      display: flex;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 1.25rem;
      gap: 0;
    }

    .section-tab {
      padding: 0.6rem 0.75rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--gray-400);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .section-tab:hover { color: var(--text); }
    .section-tab.active { color: var(--text); border-bottom-color: var(--text); }

    .view-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem 0;
    }

    .view-tab {
      padding: 0.45rem 1rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 2px solid var(--gray-200);
      background: transparent;
      color: var(--gray-400);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .view-tab:hover { border-color: var(--text); color: var(--text); }
    .view-tab.active { background: var(--text); border-color: var(--text); color: var(--bg); }

    .search-wrap {
      padding: 0.75rem 1.25rem 0;
      display: none;
    }

    .search-wrap.visible { display: block; }

    .search-input {
      width: 100%;
      padding: 0.55rem 0.85rem;
      border: 2px solid var(--gray-200);
      background: var(--bg);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--text); }
    .search-input::placeholder { color: var(--gray-200); font-weight: 700; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.4px; }

    .content { padding: 0.85rem 1.25rem 6rem; }

    .round-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .round-btn {
      background: none;
      border: 2px solid var(--gray-200);
      color: var(--text);
      padding: 0.5rem 0.9rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .round-btn:hover:not(:disabled),
    .round-btn:active:not(:disabled) {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .round-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .round-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--gray-400);
      text-align: center;
      flex: 1.5;
    }

    .board-card {
      border: 1px solid var(--gray-200);
      margin-bottom: 7px;
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: stretch;
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
    }

    .board-card.search-hidden { display: none; }

    .board-num {
      background: var(--gray-100);
      font-size: 1rem;
      font-weight: 900;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--gray-200);
      min-height: 76px;
    }

    .board-matchup { display: flex; flex-direction: column; }

    .board-player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      gap: 0.5rem;
    }

    .board-player-row + .board-player-row {
      border-top: 1px solid var(--gray-200);
    }

    .player-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .player-name {
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-name mark {
      background: #000;
      color: #fff;
      padding: 0 1px;
    }

    .player-sub {
      font-size: 0.63rem;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .color-dot.W { background: #fff; border: 1px solid #bbb; }
    .color-dot.B { background: #000; }

    .result-badge {
      flex-shrink: 0;
      padding: 3px 6px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border: 1.5px solid;
    }

    .result-W       { color: #000; border-color: #000; }
    .result-L       { color: var(--gray-400); border-color: var(--gray-200); }
    .result-D       { color: var(--gray-600); border-color: #bbb; }
    .result-B       { color: var(--gray-600); border-color: #bbb; }
    .result-U       { color: var(--gray-200); border-color: var(--gray-200); }

    .no-search-results {
      display: none;
      padding: 2rem 0;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--gray-400);
    }

    .standings-list { display: flex; flex-direction: column; margin-top: 0.75rem; }

    .standing-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 0.5rem;
      border-bottom: 1px solid var(--gray-200);
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .standing-row:first-child { border-top: 2px solid var(--text); }
    .standing-row:active { background: var(--gray-100); }

    .s-rank {
      font-size: 1rem;
      font-weight: 900;
      color: var(--gray-200);
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .s-rank.top3 { color: var(--text); }

    .s-info { flex: 1; min-width: 0; }

    .s-name {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .s-sub { font-size: 0.62rem; color: var(--gray-400); margin-top: 1px; }

    .s-pips { display: flex; gap: 2px; flex-shrink: 0; }

    .r-pip {
      width: 15px; height: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.52rem;
      font-weight: 700;
      border: 1px solid;
      flex-shrink: 0;
    }

    .r-pip.W { background: #000; color: #fff; border-color: #000; }
    .r-pip.L { background: #fff; color: var(--gray-400); border-color: var(--gray-200); }
    .r-pip.D { background: var(--gray-100); color: var(--text); border-color: var(--gray-200); }
    .r-pip.B { background: var(--gray-100); color: var(--gray-600); border-color: var(--gray-200); }
    .r-pip.U { background: #fff; color: var(--gray-200); border-color: var(--gray-200); }

    .s-score {
      font-size: 1.2rem;
      font-weight: 900;
      flex-shrink: 0;
      width: 32px;
      text-align: right;
    }

    .state-msg { padding: 4rem 1rem; text-align: center; color: var(--gray-400); }

    .state-msg .big {
      display: block;
      font-size: 1.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      color: var(--gray-200);
      margin-bottom: 0.4rem;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .popup-overlay.visible { opacity: 1; pointer-events: all; }

    .popup-sheet {
      background: #fff;
      width: 100%;
      max-width: 520px;
      padding: 1.5rem 1.5rem 2.5rem;
      transform: translateY(24px);
      transition: transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1);
      border-top: 3px solid #000;
      max-height: 88vh;
      overflow-y: auto;
    }

    .popup-overlay.visible .popup-sheet { transform: translateY(0); }

    .popup-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.4rem;
    }

    .popup-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .popup-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--gray-400);
      padding: 0.25rem 0.5rem;
      font-family: 'Montserrat', sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s;
    }

    .popup-close:hover { color: var(--text); }

    .popup-section-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 0.55rem;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 0.3rem;
    }

    /* Round options stay full-width column */
    .popup-options {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.4rem;
    }

    /* Section options go side-by-side, wrapping to new rows */
    .popup-options.sections-grid {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .popup-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      border: 2px solid var(--gray-200);
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: var(--bg);
      color: var(--text);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
      width: 100%;
    }

    /* Section option pills — compact, auto-width, wrapping */
    .sections-grid .popup-option {
      width: auto;
      flex: 1 1 calc(50% - 0.18rem);
      padding: 0.6rem 0.75rem;
      font-size: 0.7rem;
      gap: 0.4rem;
    }

    .popup-option:active { background: var(--gray-100); }
    .popup-option.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
    .popup-option .check { font-size: 0.9rem; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .popup-option.selected .check { opacity: 1; }

    .popup-go-btn {
      width: 100%;
      padding: 1rem;
      background: var(--text);
      color: var(--bg);
      border: 2px solid var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    .popup-go-btn:active { opacity: 0.75; }

    .player-card-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 3000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }

    .player-card-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .player-card-sheet {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-top: 3px solid #000;
      max-height: 82vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .player-card-overlay.visible .player-card-sheet { transform: translateY(0); }

    .pc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--gray-200);
      gap: 0.75rem;
    }

    .pc-name {
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .pc-meta {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-top: 4px;
    }

    .pc-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--gray-400);
      padding: 0.2rem 0.4rem;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s;
    }

    .pc-close:hover { color: var(--text); }

    .pc-score-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--gray-200);
      background: var(--gray-100);
    }

    .pc-score-big {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1;
    }

    .pc-score-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    .pc-score-pips {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .pc-rounds { padding: 0.75rem 1.25rem 2rem; }

    .pc-round-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--gray-200);
    }

    .pc-round-num {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--gray-400);
      width: 44px;
      flex-shrink: 0;
    }

    .pc-opp {
      flex: 1;
      min-width: 0;
    }

    .pc-opp-name {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pc-opp-sub {
      font-size: 0.62rem;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .pc-result-badge {
      flex-shrink: 0;
      padding: 4px 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border: 1.5px solid;
    }

    .pc-result-badge.W { color: #000; border-color: #000; }
    .pc-result-badge.L { color: var(--gray-400); border-color: var(--gray-200); }
    .pc-result-badge.D { color: var(--gray-600); border-color: #bbb; }
    .pc-result-badge.B { color: var(--gray-600); border-color: #bbb; }
    .pc-result-badge.U { color: var(--gray-200); border-color: var(--gray-200); }

    .pc-cumul {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gray-400);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    @media (min-width: 640px) {
      .site-header { padding: 1.25rem 2rem 1rem; }
      .section-tabs, .view-tabs, .search-wrap, .content, .top-bar { padding-left: 2rem; padding-right: 2rem; }
      .event-title { font-size: 1.8rem; }
      .section-tab { font-size: 0.7rem; padding: 0.7rem 1rem; }
      .popup-overlay { align-items: center; }
      .popup-sheet { border: 3px solid #000; max-width: 400px; width: 90%; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <div class="refresh-dot" id="refreshDot"></div>
    <span class="top-bar-ts" id="tsLeft">—</span>
  </div>
  <button class="filter-pill" id="filterPillBtn">
    <span class="filter-pill-text" id="filterPillText">—</span>
    <span class="x">✕</span>
  </button>
  <button class="top-bar-filter-btn" id="openPopupBtn" title="Filter">⊞</button>
</div>

<header class="site-header">
  <div class="header-left">
    <div class="event-title" id="eventTitle">Loading…</div>
    <div class="event-meta" id="eventMeta"></div>
  </div>
</header>

<div class="section-tabs" id="sectionTabs"></div>

<div class="view-tabs">
  <button class="view-tab active" data-view="pairings">Pairings</button>
  <button class="view-tab" data-view="standings">Standings</button>
</div>

<div class="search-wrap" id="searchWrap">
  <input class="search-input" id="searchInput" type="search" placeholder="Search player…" autocomplete="off" autocorrect="off" spellcheck="false" />
</div>

<div class="content" id="content">
  <div class="state-msg"><span class="big">Loading</span>Fetching tournament data…</div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-sheet">
    <div class="popup-top">
      <div class="popup-title">Choose what to view</div>
      <button class="popup-close" id="popupClose">✕</button>
    </div>
    <div class="popup-section-label">Section</div>
    <div class="popup-options sections-grid" id="sectionOptions"></div>
    <div class="popup-section-label">Round</div>
    <div class="popup-options" id="roundOptions">
      <button class="popup-option selected" data-round="latest">
        Latest / Current round
        <span class="check">✓</span>
      </button>
      <button class="popup-option" data-round="all">
        Browse all rounds
        <span class="check">✓</span>
      </button>
    </div>
    <button class="popup-go-btn" id="popupGoBtn">View Pairings</button>
  </div>
</div>

<div class="player-card-overlay" id="playerCardOverlay">
  <div class="player-card-sheet">
    <div class="pc-header">
      <div>
        <div class="pc-name" id="pcName">—</div>
        <div class="pc-meta" id="pcMeta">—</div>
      </div>
      <button class="pc-close" id="pcClose">✕</button>
    </div>
    <div class="pc-score-bar">
      <div>
        <div class="pc-score-big" id="pcScore">0</div>
        <div class="pc-score-label">Points</div>
      </div>
      <div>
        <div class="pc-score-label">Results</div>
        <div class="pc-score-pips" id="pcPips"></div>
      </div>
    </div>
    <div class="pc-rounds" id="pcRounds"></div>
  </div>
</div>

<script>
const DATA_URL = './pairings.json';

let tournamentData   = null;
let activeSectionIdx = 0;
let activeView       = 'pairings';
let activeRound      = {};
let browseMode       = false;
let searchQuery      = '';

let popupSectionIdx = 0;
let popupRound      = 'latest';

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const fresh = await res.json();
    const isFirst = !tournamentData;
    tournamentData = fresh;
    document.getElementById('tsLeft').textContent = 'Updated: ' + fresh.event.time_stamp;
    const dot = document.getElementById('refreshDot');
    dot.classList.remove('active');
    void dot.offsetWidth;
    dot.classList.add('active');
    if (isFirst) {
      initApp();
    } else {
      updateHeader();
      renderContent();
      updateFilterPill();
    }
  } catch (e) {
    if (!tournamentData) {
      document.getElementById('content').innerHTML =
        `<div class="state-msg"><span class="big">Error</span>Could not load pairings.json<br><small style="font-size:0.65rem;color:var(--gray-400)">${e.message}</small></div>`;
    }
  }
}

function initApp() {
  const d = tournamentData;
  document.title = d.event.name;
  updateHeader();
  d.sections.forEach((sec, i) => { activeRound[i] = sec.rounds_paired; });
  buildSectionTabs();
  buildViewTabs();
  buildPopupSections();
  showPopup();
  renderContent();
}

function updateHeader() {
  const ev = tournamentData.event;
  document.getElementById('eventTitle').textContent = ev.name;
  document.getElementById('eventMeta').innerHTML =
    `<span>${ev.city}, ${ev.state}</span> · TD: <span>${ev.td}</span>`;
}

function buildSectionTabs() {
  const el = document.getElementById('sectionTabs');
  el.innerHTML = '';
  tournamentData.sections.forEach((sec, i) => {
    const t = document.createElement('div');
    t.className = 'section-tab' + (i === activeSectionIdx ? ' active' : '');
    t.textContent = sec.section;
    t.title = sec.section;
    t.onclick = () => {
      activeSectionIdx = i;
      document.querySelectorAll('.section-tab').forEach((s, j) =>
        s.classList.toggle('active', j === i));
      clearSearch();
      renderContent();
      updateFilterPill();
    };
    el.appendChild(t);
  });
}

function buildViewTabs() {
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.onclick = () => {
      activeView = btn.dataset.view;
      document.querySelectorAll('.view-tab').forEach(b =>
        b.classList.toggle('active', b.dataset.view === activeView));
      clearSearch();
      renderContent();
      updateSearchBar();
    };
  });
}

function updateSearchBar() {
  document.getElementById('searchWrap').classList.toggle('visible', activeView === 'pairings');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  applySearch();
});

function applySearch() {
  const cards = document.querySelectorAll('.board-card');
  let visible = 0;
  cards.forEach(card => {
    if (!searchQuery) {
      card.classList.remove('search-hidden');
      visible++;
      return;
    }
    const names = card.querySelectorAll('.player-name');
    let match = false;
    names.forEach(n => {
      if (n.textContent.toLowerCase().includes(searchQuery)) match = true;
    });
    card.classList.toggle('search-hidden', !match);
    if (match) visible++;
  });
  const noRes = document.getElementById('noSearchResults');
  if (noRes) noRes.style.display = visible === 0 && searchQuery ? 'block' : 'none';
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
}

function updateFilterPill() {
  const pill = document.getElementById('filterPillBtn');
  const text = document.getElementById('filterPillText');
  const sec  = tournamentData.sections[activeSectionIdx];
  const rnd  = browseMode ? 'All rds' : `Rd ${activeRound[activeSectionIdx]}`;
  text.textContent = sec.section + ' · ' + rnd;
  pill.style.display = 'inline-flex';
}

document.getElementById('filterPillBtn').onclick = () => showPopup();
document.getElementById('openPopupBtn').onclick  = () => showPopup();

function buildPopupSections() {
  const el = document.getElementById('sectionOptions');
  el.innerHTML = '';
  tournamentData.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'popup-option' + (i === activeSectionIdx ? ' selected' : '');
    btn.dataset.section = i;
    btn.innerHTML = `${sec.section} <span class="check">✓</span>`;
    btn.onclick = () => {
      popupSectionIdx = i;
      el.querySelectorAll('.popup-option').forEach((b, j) =>
        b.classList.toggle('selected', j === i));
    };
    el.appendChild(btn);
  });
  popupSectionIdx = activeSectionIdx;
}

function showPopup() {
  if (!tournamentData) return;
  buildPopupSections();
  document.querySelectorAll('#roundOptions .popup-option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.round === (browseMode ? 'all' : 'latest'));
  });
  document.getElementById('popupOverlay').classList.add('visible');
}

function hidePopup() {
  document.getElementById('popupOverlay').classList.remove('visible');
}

document.getElementById('popupClose').onclick = hidePopup;
document.getElementById('popupOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popupOverlay')) hidePopup();
});

document.querySelectorAll('#roundOptions .popup-option').forEach(btn => {
  btn.onclick = () => {
    popupRound = btn.dataset.round;
    document.querySelectorAll('#roundOptions .popup-option').forEach(b =>
      b.classList.toggle('selected', b === btn));
  };
});

document.getElementById('popupGoBtn').onclick = () => {
  activeSectionIdx = popupSectionIdx;
  browseMode = (popupRound === 'all');
  if (!browseMode)
    activeRound[activeSectionIdx] = tournamentData.sections[activeSectionIdx].rounds_paired;
  document.querySelectorAll('.section-tab').forEach((t, i) =>
    t.classList.toggle('active', i === activeSectionIdx));
  activeView = 'pairings';
  document.querySelectorAll('.view-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.view === 'pairings'));
  clearSearch();
  renderContent();
  updateFilterPill();
  updateSearchBar();
  hidePopup();
};

function renderContent() {
  if (!tournamentData) return;
  const sec       = tournamentData.sections[activeSectionIdx];
  const playerMap = buildPlayerMap(sec.players);
  document.getElementById('content').innerHTML =
    activeView === 'pairings'
      ? renderPairings(sec, playerMap)
      : renderStandings(sec, playerMap);
  if (activeView === 'pairings') {
    document.getElementById('prevRound')?.addEventListener('click', () => {
      activeRound[activeSectionIdx]--;
      clearSearch();
      renderContent();
    });
    document.getElementById('nextRound')?.addEventListener('click', () => {
      activeRound[activeSectionIdx]++;
      clearSearch();
      renderContent();
    });
    if (searchQuery) applySearch();
  }
  updateSearchBar();
}

function buildPlayerMap(players) {
  const m = {};
  for (const p of players) m[p.pair_number] = p;
  return m;
}

function playerShortName(name) {
  if (!name) return '—';
  const parts = name.split(',');
  if (parts.length === 2) return parts[1].trim() + ' ' + parts[0].trim();
  return name;
}

function resultLabel(r) {
  return { W:'Win', L:'Loss', D:'Draw', B:'Bye', U:'Unplayed' }[r] || r;
}

function highlightName(name) {
  if (!searchQuery) return name;
  const idx = name.toLowerCase().indexOf(searchQuery);
  if (idx === -1) return name;
  return name.slice(0, idx) +
    `<mark>${name.slice(idx, idx + searchQuery.length)}</mark>` +
    name.slice(idx + searchQuery.length);
}

function renderPairings(sec, playerMap) {
  const totalRounds = sec.rounds_paired;
  const round       = activeRound[activeSectionIdx];
  const roundIdx    = round - 1;
  const hasResults  = round <= sec.rounds_played;

  let roundNavHtml = '';
  if (browseMode) {
    const prevDis = round <= 1 ? 'disabled' : '';
    const nextDis = round >= totalRounds ? 'disabled' : '';
    roundNavHtml = `
      <div class="round-nav">
        <button class="round-btn" id="prevRound" ${prevDis}>← Prev</button>
        <span class="round-label">Round ${round} / ${totalRounds}</span>
        <button class="round-btn" id="nextRound" ${nextDis}>Next →</button>
      </div>`;
  } else {
    roundNavHtml = `
      <div class="round-nav">
        <span class="round-label" style="flex:none;color:var(--text)">Round ${round} of ${totalRounds}</span>
      </div>`;
  }

  let boards = [];

  if (round === totalRounds && sec.pairings.length) {
    boards = sec.pairings.map(p => {
      if (!p.board || !p.black) {
        const byePlayer = playerMap[p.white];
        const byeResult = byePlayer?.results?.[roundIdx];
        return { board: 999, bye: byePlayer, byeResult: byeResult || 'B' };
      }
      return {
        board: p.board,
        white: playerMap[p.white],
        black: playerMap[p.black],
        whiteResult: playerMap[p.white]?.results?.[roundIdx],
        blackResult: playerMap[p.black]?.results?.[roundIdx],
      };
    });
  } else {
    const seen = new Set();
    const tmp  = [];
    for (const p of Object.values(playerMap)) {
      const oppNum = p.ops?.[roundIdx];
      const board  = p.boards?.[roundIdx];
      const color  = p.colors?.[roundIdx];
      if (!oppNum || seen.has(p.pair_number)) continue;
      const opp = playerMap[oppNum];
      if (!opp) continue;
      seen.add(p.pair_number);
      seen.add(oppNum);
      const white = color === 'W' ? p : opp;
      const black = color === 'B' ? p : opp;
      tmp.push({ board, white, black,
        whiteResult: white.results?.[roundIdx],
        blackResult: black.results?.[roundIdx] });
    }
    for (const p of Object.values(playerMap)) {
      const result = p.results?.[roundIdx];
      if ((result === 'B' || result === 'U') && !seen.has(p.pair_number)) {
        seen.add(p.pair_number);
        tmp.push({ board: 999, bye: p, byeResult: result });
      }
    }
    boards = tmp.sort((a, b) => a.board - b.board);
  }

  if (!boards.length) {
    return roundNavHtml + `<div class="state-msg"><span class="big">No Pairings</span>Nothing available for this round.</div>`;
  }

  let html = roundNavHtml;

  for (const b of boards) {
    if (b.bye) {
      const name = playerShortName(b.bye.name);
      html += `
        <div class="board-card" data-players="${name.toLowerCase()}">
          <div class="board-num" style="font-size:0.55rem;letter-spacing:0.5px">BYE</div>
          <div class="board-matchup">
            <div class="board-player-row">
              <div class="player-info">
                <div class="player-name">${name}</div>
                <div class="player-sub">${b.byeResult === 'B' ? 'Bye' : 'Unplayed'}</div>
              </div>
              <span class="result-badge result-${b.byeResult}">${b.byeResult === 'B' ? 'Bye' : 'U'}</span>
            </div>
          </div>
        </div>`;
      continue;
    }

    const wName   = playerShortName(b.white?.name);
    const bName   = playerShortName(b.black?.name);
    const wRating = b.white?.rating || 'Unrated';
    const bRating = b.black?.rating || 'Unrated';
    const wCums   = b.white?.cumulatives;
    const bCums   = b.black?.cumulatives;
    const wScore  = wCums?.length ? wCums[wCums.length - 1] : (b.white?.score ?? '—');
    const bScore  = bCums?.length ? bCums[bCums.length - 1] : (b.black?.score ?? '—');
    const wRes    = b.whiteResult;
    const bRes    = b.blackResult;

    // Only show a badge when there's an actual result — no pending/empty boxes
    const wBadge = wRes
      ? `<span class="result-badge result-${wRes}">${resultLabel(wRes)}</span>`
      : '';
    const bBadge = bRes
      ? `<span class="result-badge result-${bRes}">${resultLabel(bRes)}</span>`
      : '';

    html += `
      <div class="board-card" data-players="${wName.toLowerCase()} ${bName.toLowerCase()}">
        <div class="board-num">${b.board}</div>
        <div class="board-matchup">
          <div class="board-player-row">
            <div class="player-info">
              <div class="player-name">${highlightName(wName)}</div>
              <div class="player-sub">
                <span class="color-dot W"></span>
                <span style="font-size:0.6rem;font-weight:700;letter-spacing:0.4px;text-transform:uppercase">White</span>
                <span>${wRating}</span>
                <span>·</span>
                <span>${wScore} pts</span>
              </div>
            </div>
            ${wBadge}
          </div>
          <div class="board-player-row">
            <div class="player-info">
              <div class="player-name">${highlightName(bName)}</div>
              <div class="player-sub">
                <span class="color-dot B"></span>
                <span style="font-size:0.6rem;font-weight:700;letter-spacing:0.4px;text-transform:uppercase">Black</span>
                <span>${bRating}</span>
                <span>·</span>
                <span>${bScore} pts</span>
              </div>
            </div>
            ${bBadge}
          </div>
        </div>
      </div>`;
  }

  html += `<div id="noSearchResults" class="no-search-results" style="display:none">No players found</div>`;
  return html;
}

function renderStandings(sec, playerMap) {
  const standings = sec.standings.map(pn => playerMap[pn]).filter(Boolean);
  let html = '<div class="standings-list">';
  standings.forEach((p, i) => {
    const rank   = i + 1;
    const topCls = rank <= 3 ? ' top3' : '';
    const name   = playerShortName(p.name);
    const pips   = (p.results || []).map(r =>
      `<div class="r-pip ${r}" title="${resultLabel(r)}">${r}</div>`).join('');
    html += `
      <div class="standing-row" onclick="openPlayerCard(${p.pair_number})">
        <div class="s-rank${topCls}">${rank}</div>
        <div class="s-info">
          <div class="s-name">${name}</div>
          <div class="s-sub">${p.rating || 'Unrated'}${p.id1 ? ' · ' + p.id1 : ''}</div>
        </div>
        <div class="s-pips">${pips}</div>
        <div class="s-score">${p.cumulatives?.length ? p.cumulatives[p.cumulatives.length - 1] : p.score}</div>
      </div>`;
  });
  html += '</div>';
  return html;
}

document.getElementById('pcClose').onclick = closePlayerCard;
document.getElementById('playerCardOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('playerCardOverlay')) closePlayerCard();
});

function closePlayerCard() {
  document.getElementById('playerCardOverlay').classList.remove('visible');
}

function openPlayerCard(pairNum) {
  const sec       = tournamentData.sections[activeSectionIdx];
  const playerMap = buildPlayerMap(sec.players);
  const p         = playerMap[pairNum];
  if (!p) return;
  const name  = playerShortName(p.name);
  const score = p.cumulatives?.length
    ? p.cumulatives[p.cumulatives.length - 1]
    : p.score;
  document.getElementById('pcName').textContent  = name;
  document.getElementById('pcMeta').textContent  =
    `${p.rating || 'Unrated'}${p.id1 ? ' · ' + p.id1 : ''}${p.state ? ' · ' + p.state : ''}`;
  document.getElementById('pcScore').textContent = score;
  const pips = (p.results || []).map(r =>
    `<div class="r-pip ${r}">${r}</div>`).join('');
  document.getElementById('pcPips').innerHTML = pips;
  const totalRounds = p.results?.length || 0;
  let roundsHtml = '';
  if (!totalRounds) {
    roundsHtml = `<div style="font-size:0.72rem;color:var(--gray-400);padding:1rem 0">No rounds played yet.</div>`;
  } else {
    for (let ri = 0; ri < totalRounds; ri++) {
      const result  = p.results?.[ri];
      const color   = p.colors?.[ri];
      const oppNum  = p.ops?.[ri];
      const board   = p.boards?.[ri];
      const cumul   = p.cumulatives?.[ri] ?? '—';
      const opp     = oppNum ? playerMap[oppNum] : null;
      const oppName = opp ? playerShortName(opp.name) : (result === 'B' ? 'Bye' : '—');
      const oppRating = opp?.rating || (result === 'B' ? '' : 'Unrated');
      const colorLabel = color === 'W' ? 'White' : color === 'B' ? 'Black' : '';
      const colorDot   = color === 'W'
        ? `<span class="color-dot W" style="width:8px;height:8px;border-radius:50%;background:#fff;border:1px solid #bbb;display:inline-block"></span>`
        : color === 'B'
        ? `<span class="color-dot B" style="width:8px;height:8px;border-radius:50%;background:#000;border-radius:50%;display:inline-block"></span>`
        : '';
      roundsHtml += `
        <div class="pc-round-row">
          <div class="pc-round-num">Rd ${ri + 1}${board ? '<br>Bd ' + board : ''}</div>
          <div class="pc-opp">
            <div class="pc-opp-name">${oppName}</div>
            <div class="pc-opp-sub">
              ${colorDot}
              ${colorLabel ? `<span>${colorLabel}</span>` : ''}
              ${oppRating ? `<span>·</span><span>${oppRating}</span>` : ''}
            </div>
          </div>
          <span class="pc-result-badge ${result}">${resultLabel(result)}</span>
          <div class="pc-cumul">${cumul}</div>
        </div>`;
    }
  }
  document.getElementById('pcRounds').innerHTML = roundsHtml;
  document.getElementById('playerCardOverlay').classList.add('visible');
}

loadData();
setInterval(loadData, 120_000);
</script>
</body>
</html>
