
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #1e1e2e;
      --surface:  #28283d;
      --surface2: #313149;
      --border:   #3a3a55;
      --text:     #cdd6f4;
      --subtext:  #6c7086;
      --accent:   #89b4fa;
      --green:    #a6e3a1;
      --red:      #f38ba8;
      --today-bg: #89b4fa;
      --today-fg: #1e1e2e;
      --r:        8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cantarell', 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 18px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #topbar h1 { font-size: 14px; font-weight: 700; }
    #topbar .sub { font-size: 11px; color: var(--subtext); margin-top: 1px; }
    .icon-btn {
      background: none; border: none; color: var(--subtext);
      cursor: pointer; padding: 5px; border-radius: 6px; font-size: 15px;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── Middle (sidebar + main) ── */
    #app {
      display: flex; flex: 1; min-height: 0; /* critical for flex overflow */
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 200px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    #sidebar-header {
      padding: 12px 14px 8px; font-size: 10px; font-weight: 700;
      letter-spacing: 1px; color: var(--subtext); text-transform: uppercase; flex-shrink: 0;
    }
    #student-list { flex: 1; overflow-y: auto; padding: 0 6px; min-height: 0; }
    .student-item {
      display: flex; align-items: center; padding: 7px 8px;
      border-radius: var(--r); cursor: pointer; gap: 8px;
      transition: background 0.12s; margin-bottom: 2px;
    }
    .student-item:hover, .student-item.active { background: var(--surface2); }
    .s-avatar {
      width: 26px; height: 26px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .s-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .s-count { font-size: 10px; color: var(--subtext); flex-shrink: 0; }
    .s-remove {
      background: none; border: none; color: transparent;
      cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 3px;
    }
    .student-item:hover .s-remove { color: var(--subtext); }
    .s-remove:hover { color: var(--red) !important; }
    #add-area { padding: 8px 6px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
    #add-area input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: inherit;
      font-size: 12px; padding: 6px 9px; outline: none;
    }
    #add-area input:focus { border-color: var(--accent); }
    #add-area input::placeholder { color: var(--subtext); }
    #add-btn {
      width: 100%; margin-top: 5px; background: var(--accent);
      color: var(--today-fg); border: none; border-radius: 7px;
      padding: 6px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    }

    /* ── Main column ── */
    #main { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    #cal-header {
      display: flex; align-items: center; padding: 11px 20px; gap: 10px;
      flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    #cal-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }
    #cal-sub { font-size: 11px; color: var(--subtext); text-align: center; margin-top: 1px; }
    .nav-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); width: 28px; height: 28px; border-radius: 7px;
      cursor: pointer; font-size: 18px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .nav-btn:hover { background: var(--border); }

    /* The scrollable calendar area */
    #view-area { flex: 1; overflow-y: auto; min-height: 0; }

    /* ── Status bar — lives OUTSIDE the scrollable area ── */
    #status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 18px; font-size: 11px; color: var(--subtext);
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #refresh-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--subtext);
      border-radius: 5px; padding: 3px 12px; font-family: inherit; font-size: 11px; cursor: pointer;
    }
    #refresh-btn:hover { background: var(--border); color: var(--text); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Calendar ── */
    .cal-wrap { max-width: 720px; margin: 0 auto; padding: 14px 16px 24px; }
    .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 5px; }
    .day-header {
      text-align: center; font-size: 12px; font-weight: 700;
      letter-spacing: 0.5px; color: var(--subtext); text-transform: uppercase; padding: 4px 0;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

    .cal-cell {
      height: 72px; border-radius: var(--r);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      transition: filter 0.1s; padding: 4px; overflow: hidden;
    }
    .cal-cell.other-month { background: transparent; border-color: transparent; opacity: 0.2; }
    .cal-cell.future { opacity: 0.35; }
    .cal-cell.has-games { cursor: pointer; }
    .cal-cell.has-games:hover { filter: brightness(1.15); }
    .cal-cell.today .day-num {
      background: var(--today-bg); color: var(--today-fg);
      border-radius: 50%; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .day-num  { font-size: 15px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .g-count  { font-size: 17px; font-weight: 700; line-height: 1; }
    .g-label  { font-size: 10px; opacity: 0.75; line-height: 1; }

    /* ── Game popup ── */
    #popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 50;
      align-items: center; justify-content: center;
    }
    #popup-overlay.open { display: flex; }
    #popup {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      width: min(700px, 95vw); max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    #popup h3 { font-size: 14px; margin-bottom: 12px; flex-shrink: 0; }
    #popup-games { display: grid; gap: 4px; overflow-y: auto; flex: 1; }
    .game-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 8px; border-radius: 6px; gap: 8px;
      background: var(--surface2); font-size: 12px;
      text-decoration: none; color: var(--text); transition: background 0.12s;
    }
    .game-row:hover { background: var(--border); }
    .g-sub { color: var(--subtext); font-size: 11px; margin-top: 2px; }
    .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      background: var(--bg); font-weight: 700; flex-shrink: 0;
    }
    .badge.win  { color: var(--green); }
    .badge.loss { color: var(--red); }
    .badge.draw { color: var(--subtext); }
    .popup-close {
      width: 100%; margin-top: 10px; background: var(--surface2);
      color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px; font-family: inherit; font-size: 12px; cursor: pointer;
    }

    /* ── Settings ── */
    #settings-panel {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #settings-panel.open { display: flex; }
    .s-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; width: 360px;
    }
    .s-box h2 { font-size: 15px; margin-bottom: 4px; }
    .s-box p  { font-size: 12px; color: var(--subtext); margin-bottom: 14px; }
    .s-box input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: monospace;
      font-size: 12px; padding: 8px 10px; outline: none; margin-bottom: 12px;
    }
    .s-box input:focus { border-color: var(--accent); }
    .s-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-p {
      background: var(--accent); color: var(--today-fg); border: none;
      border-radius: 7px; padding: 7px 16px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-s {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 12px; font-family: inherit; font-size: 13px; cursor: pointer;
    }
    .empty { text-align: center; color: var(--subtext); font-size: 13px; padding: 60px 20px; }
  </style>
</head>
<body>

<div id="topbar">
  <div>
    <h1 id="page-title">♟ Chess Tracker</h1>
    <div class="sub" id="page-sub">This week's activity</div>
  </div>
  <button class="icon-btn" onclick="openSettings()">⚙</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">Students</div>
    <div id="student-list"></div>
    <div id="add-area">
      <input id="newUser" placeholder="lichess username..."
             onkeydown="if(event.key==='Enter')addStudent()" />
      <button id="add-btn" onclick="addStudent()">+ Add Student</button>
    </div>
  </div>

  <div id="main">
    <div id="cal-header">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" style="visibility:hidden">‹</button>
      <div style="flex:1;text-align:center">
        <div id="cal-title">This Week</div>
        <div id="cal-sub"></div>
      </div>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)" style="visibility:hidden">›</button>
    </div>

    <div id="view-area"></div>

    <div id="status-bar">
      <span id="status-text">Connecting...</span>
      <button id="refresh-btn" onclick="forceRefresh()">↻ Refresh</button>
    </div>
  </div>
</div>

<!-- Game popup -->
<div id="popup-overlay" onclick="if(event.target===this)closePopup()">
  <div id="popup">
    <h3 id="popup-title"></h3>
    <div id="popup-games"></div>
    <button class="popup-close" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- Settings -->
<div id="settings-panel">
  <div class="s-box">
    <h2>Worker URL</h2>
    <p>Paste your Cloudflare Worker URL.</p>
    <input id="workerInput" placeholder="https://your-worker.workers.dev" />
    <div class="s-actions">
      <button class="btn-s" onclick="closeSettings()">Cancel</button>
      <button class="btn-p" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  // ── Constants ────────────────────────────────────────────────────
  const TODAY       = new Date().toISOString().slice(0,10);
  const DAY_LABELS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTH_NAMES = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  const CV = "v3"; // cache version — bump to bust all old data

  // ── State ────────────────────────────────────────────────────────
  let API = localStorage.getItem("workerUrl") || "";
  let students  = [];
  let weekData  = [];       // array of { username, days:{date:[games]}, total }
  let view      = "week";   // "week" | "month"
  let activeUser = null;
  let calMonth  = new Date();
  let timer     = null;

  // game store: keyed by dateStr, holds array of game objects
  const GS = {};
  function gs(key, arr) { GS[key] = arr; }
  function go(key)      { showPopup(GS[key] || [], key); }

  // ── Cache ────────────────────────────────────────────────────────
  function cSet(k, v) {
    try { localStorage.setItem(CV+"_"+k, JSON.stringify({ts:Date.now(), v})); } catch {}
  }
  function cGet(k, ttl) {
    try {
      const raw = localStorage.getItem(CV+"_"+k);
      if (!raw) return null;
      const {ts, v} = JSON.parse(raw);
      return (Date.now()-ts < ttl) ? v : null;
    } catch { return null; }
  }
  function cStale(k) {
    try { const r = localStorage.getItem(CV+"_"+k); return r ? JSON.parse(r).v : null; }
    catch { return null; }
  }
  function cDel(k) { localStorage.removeItem(CV+"_"+k); }

  // ── Init ─────────────────────────────────────────────────────────
  window.onload = () => {
    if (!API) { openSettings(); return; }
    document.getElementById("workerInput").value = API;
    start();
  };

  function start() {
    clearInterval(timer);
    loadAll();
    timer = setInterval(loadAll, 5*60*1000);
  }

  // ── Core load ────────────────────────────────────────────────────
  async function loadAll(force=false) {
    if (!API) return;
    const cs = cGet("students", 5*60*1000);
    const cw = cGet("week",     5*60*1000);
    if (!force && cs && cw) {
      students = cs; weekData = cw;
      renderSidebar();
      if (view === "week") renderWeek();
      setStatus("cached");
      fetchWeek();        // silent background update
      return;
    }
    setStatus("loading");
    await fetchWeek();
  }

  async function fetchWeek() {
    try {
      const [sr, wr] = await Promise.all([
        fetch(API+"/students"),
        fetch(API+"/week"),
      ]);
      if (!sr.ok || !wr.ok) throw new Error("bad status");
      students = await sr.json();
      weekData  = await wr.json();
      cSet("students", students);
      cSet("week",     weekData);
      renderSidebar();
      if (view === "week") renderWeek();
      setStatus("ok");
    } catch(e) {
      students = cStale("students") || students;
      weekData  = cStale("week")    || weekData;
      renderSidebar();
      if (view === "week") renderWeek();
      setStatus("error");
    }
  }

  // ── Student add/remove ───────────────────────────────────────────
  async function addStudent() {
    const inp = document.getElementById("newUser");
    const u = inp.value.trim();
    if (!u || !API) return;
    const r = await fetch(API+"/students", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({username:u}),
    });
    const d = await r.json();
    if (d.error) { alert(d.error); return; }
    inp.value = "";
    cDel("students"); cDel("week");
    await loadAll(true);
  }

  async function removeStudent(u) {
    if (!confirm("Remove "+u+"?")) return;
    await fetch(API+"/students/"+u, {method:"DELETE"});
    cDel("students"); cDel("week");
    if (activeUser === u) showWeekView();
    else await loadAll(true);
  }

  // ── Sidebar ──────────────────────────────────────────────────────
  function renderSidebar() {
    const el = document.getElementById("student-list");
    if (!students.length) {
      el.innerHTML = `<div style="padding:10px 8px;font-size:12px;color:var(--subtext)">No students yet.</div>`;
      return;
    }
    const byUser = {};
    for (const r of weekData) if (r.username) byUser[r.username] = r;

    el.innerHTML = students.map(u => {
      const total = byUser[u]?.total || 0;
      return `<div class="student-item ${activeUser===u?'active':''}" onclick="openStudent('${u}')">
        <div class="s-avatar">${u[0].toUpperCase()}</div>
        <div class="s-name">@${u}</div>
        <div class="s-count">${total>0?total+"♟":""}</div>
        <button class="s-remove" onclick="event.stopPropagation();removeStudent('${u}')">✕</button>
      </div>`;
    }).join("");
  }

  // ── Week view ─────────────────────────────────────────────────────
  function showWeekView() {
    view = "week"; activeUser = null;
    document.getElementById("prev-btn").style.visibility = "hidden";
    document.getElementById("next-btn").style.visibility = "hidden";
    document.getElementById("page-title").textContent = "♟ Chess Tracker";
    document.getElementById("page-sub").textContent   = "This week's activity";
    renderSidebar();
    renderWeek();
  }

  function renderWeek() {
    const days = weekDays();
    document.getElementById("cal-title").textContent = "This Week";
    document.getElementById("cal-sub").textContent   = fmtDate(days[0])+" – "+fmtDate(days[6]);

    const el = document.getElementById("view-area");
    const byUser = {};
    for (const r of weekData) if (r.username) byUser[r.username] = r;

    if (!students.length) {
      el.innerHTML = `<div class="empty">♟<br><br>Add students in the sidebar.</div>`;
      return;
    }

    let html = `<div class="cal-wrap"><div class="day-headers">`;
    for (const d of days) {
      const dt = new Date(d+"T12:00:00Z");
      const hi = d===TODAY ? "color:var(--accent)" : "";
      html += `<div class="day-header" style="${hi}">${DAY_LABELS[dt.getUTCDay()]}<br>
        <span style="font-size:13px;font-weight:700;letter-spacing:0">${dt.getUTCDate()}</span></div>`;
    }
    html += `</div><div class="cal-grid">`;

    for (const d of days) {
      const dt       = new Date(d+"T12:00:00Z");
      const isFuture = d > TODAY;
      const isToday  = d === TODAY;
      const games    = [];
      for (const u of students) {
        const dg = byUser[u]?.days?.[d] || [];
        for (const g of dg) games.push({...g, username:u});
      }
      const count = games.length;
      const has   = count > 0 && !isFuture;
      if (has) gs(d, games);

      const cs  = has ? colorStyle(games) : null;
      const sty = cs  ? `style="background:${cs.bg};border-color:${cs.bd}"` : "";
      const cls = ["cal-cell", has?"has-games":"", isToday?"today":"", isFuture?"future":""].filter(Boolean).join(" ");
      const clk = has ? `onclick="go('${d}')"` : "";

      html += `<div class="${cls}" ${sty} ${clk}>
        <div class="day-num">${dt.getUTCDate()}</div>`;
      if (has && cs) html += `<div class="g-count" style="color:${cs.tx}">${count}</div>
        <div class="g-label" style="color:${cs.tx}">${count===1?"game":"games"}</div>`;
      html += `</div>`;
    }
    html += `</div></div>`;
    el.innerHTML = html;
  }

  // ── Month view ────────────────────────────────────────────────────
  async function openStudent(u) {
    view = "month"; activeUser = u;
    calMonth = new Date(); calMonth.setDate(1);
    document.getElementById("prev-btn").style.visibility = "visible";
    document.getElementById("next-btn").style.visibility = "visible";
    document.getElementById("page-title").textContent = "@"+u;
    document.getElementById("page-sub").textContent   = "Monthly activity";
    renderSidebar();
    await fetchMonth(u);
  }

  async function navigate(dir) {
    if (view !== "month" || !activeUser) return;
    calMonth.setMonth(calMonth.getMonth()+dir);
    await fetchMonth(activeUser);
  }

  async function fetchMonth(u) {
    const y = calMonth.getFullYear();
    const m = calMonth.getMonth();
    document.getElementById("cal-title").textContent = MONTH_NAMES[m]+" "+y;
    document.getElementById("cal-sub").textContent   = "@"+u;

    const isPast = y < new Date().getFullYear() ||
                  (y === new Date().getFullYear() && m < new Date().getMonth());
    const ck  = `month_${u}_${y}_${m}`;
    const ttl = isPast ? 24*60*60*1000 : 60*60*1000;

    const cached = cGet(ck, ttl);
    if (cached) {
      renderMonth(u, cached);
      setStatus("cached");
      return;
    }

    document.getElementById("view-area").innerHTML =
      `<div class="empty">Loading games from Lichess...</div>`;
    setStatus("loading");

    const since = new Date(Date.UTC(y,m,1)).getTime();
    const until = new Date(Date.UTC(y,m+1,1)).getTime();
    const dayGames = {};

    try {
      const res  = await fetch(
        `https://lichess.org/api/games/user/${u}?since=${since}&until=${until}&moves=false&clocks=false&evals=false&max=500`,
        { headers: { Accept: "application/x-ndjson" } }
      );
      if (!res.ok) throw new Error("lichess "+res.status);
      const text = await res.text();
      const lines = text.trim().split("\n").filter(l => l.trim());

      for (const line of lines) {
        let g;
        try { g = JSON.parse(line); } catch { continue; }
        const ts = g.lastMoveAt || g.createdAt;
        if (!ts) continue;
        const date  = new Date(ts).toISOString().slice(0,10);
        const white = (g.players?.white?.user?.name || "").toLowerCase();
        const black = (g.players?.black?.user?.name || "").toLowerCase();
        const uLower = u.toLowerCase();
        const color  = white === uLower ? "white" : "black";
        const oppName = color === "white"
          ? (g.players?.black?.user?.name || "?")
          : (g.players?.white?.user?.name || "?");
        // g.winner is "white", "black", or absent for draw
        const result = !g.winner ? "draw" : g.winner === color ? "win" : "loss";

        if (!dayGames[date]) dayGames[date] = [];
        dayGames[date].push({
          id: g.id, url: `https://lichess.org/${g.id}`,
          speed: g.speed || "?",
          color, result, opponent: oppName, username: u,
        });
      }

      cSet(ck, dayGames);
      renderMonth(u, dayGames);
      setStatus("ok");
    } catch(e) {
      const stale = cStale(ck);
      if (stale) { renderMonth(u, stale); setStatus("error"); return; }
      document.getElementById("view-area").innerHTML =
        `<div class="empty">Could not load from Lichess.<br>${e.message}</div>`;
      setStatus("error");
    }
  }

  function renderMonth(u, dayGames) {
    const y = calMonth.getFullYear();
    const m = calMonth.getMonth();
    const firstDay   = new Date(Date.UTC(y,m,1)).getUTCDay();
    const daysInMon  = new Date(Date.UTC(y,m+1,0)).getUTCDate();
    const prevLast   = new Date(Date.UTC(y,m,0)).getUTCDate();
    const total      = Object.values(dayGames).flat().length;
    const active     = Object.keys(dayGames).length;

    let html = `<div class="cal-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <a href="https://lichess.org/@/${u}" target="_blank"
           style="color:var(--accent);font-size:12px;text-decoration:none">Open on Lichess ↗</a>
        <span style="font-size:11px;color:var(--subtext)">${total} games · ${active} active days</span>
      </div>
      <div class="day-headers">
        ${DAY_LABELS.map(d=>`<div class="day-header">${d}</div>`).join("")}
      </div>
      <div class="cal-grid">`;

    // leading blanks
    for (let i=0; i<firstDay; i++)
      html += `<div class="cal-cell other-month"><div class="day-num">${prevLast-firstDay+1+i}</div></div>`;

    for (let d=1; d<=daysInMon; d++) {
      const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const games    = dayGames[ds] || [];
      const count    = games.length;
      const isToday  = ds === TODAY;
      const isFuture = ds > TODAY;
      const has      = count > 0;
      if (has) gs(ds, games);

      const cs  = has ? colorStyle(games) : null;
      const sty = cs  ? `style="background:${cs.bg};border-color:${cs.bd}"` : "";
      const cls = ["cal-cell", has?"has-games":"", isToday?"today":"", isFuture?"future":""].filter(Boolean).join(" ");
      const clk = has ? `onclick="go('${ds}')"` : "";

      html += `<div class="${cls}" ${sty} ${clk}>
        <div class="day-num">${d}</div>`;
      if (has && cs) html += `<div class="g-count" style="color:${cs.tx}">${count}</div>
        <div class="g-label" style="color:${cs.tx}">${count===1?"game":"games"}</div>`;
      html += `</div>`;
    }

    const trail = 7 - ((firstDay+daysInMon)%7);
    if (trail < 7) for (let d=1; d<=trail; d++)
      html += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;

    html += `</div></div>`;
    document.getElementById("view-area").innerHTML = html;
  }

  // ── Popup ────────────────────────────────────────────────────────
  function showPopup(games, dateStr) {
    const dt = new Date(dateStr+"T12:00:00Z");
    document.getElementById("popup-title").textContent =
      "Games on "+dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});

    const cols = games.length > 4 ? 2 : 1;
    document.getElementById("popup-games").style.gridTemplateColumns =
      cols > 1 ? "1fr 1fr" : "1fr";

    document.getElementById("popup-games").innerHTML = games.map(g => {
      const icon   = g.color==="white" ? "♔" : "♚";
      const clabel = g.color==="white" ? "White" : "Black";
      const rl     = g.result==="win" ? "Win" : g.result==="loss" ? "Loss" : "Draw";
      const rc     = g.result==="win" ? "win" : g.result==="loss" ? "loss" : "draw";
      const opp    = g.opponent || "?";
      const who    = g.username ? `<span style="color:var(--accent)">@${g.username}</span>` : "";
      return `<a href="${g.url}" target="_blank" class="game-row">
        <div style="min-width:0">
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${who} vs ${opp}</div>
          <div class="g-sub">${icon} ${clabel} · ${g.speed}</div>
        </div>
        <div class="badge ${rc}">${rl}</div>
      </a>`;
    }).join("");

    document.getElementById("popup-overlay").classList.add("open");
  }

  function closePopup() { document.getElementById("popup-overlay").classList.remove("open"); }

  // ── Force refresh ─────────────────────────────────────────────────
  function forceRefresh() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true; btn.textContent = "↻ Refreshing...";

    cDel("students"); cDel("week");

    let op;
    if (view === "month" && activeUser) {
      const y = calMonth.getFullYear(), m = calMonth.getMonth();
      cDel(`month_${activeUser}_${y}_${m}`);
      op = fetchMonth(activeUser);
    } else {
      op = fetchWeek();
    }
    op.finally(() => { btn.disabled=false; btn.textContent="↻ Refresh"; });
  }

  // ── Color style for a day ─────────────────────────────────────────
  function colorStyle(games) {
    const total = games.length; if (!total) return null;
    const w = games.filter(g=>g.result==="win").length / total;
    const l = games.filter(g=>g.result==="loss").length / total;
    if (w > l && w > (1-w-l)) {
      const a = 0.12 + w*0.28;
      return { bg:`rgba(166,227,161,${a})`, bd:`rgba(166,227,161,${a+0.3})`, tx:"#a6e3a1" };
    } else if (l > w && l > (1-w-l)) {
      const a = 0.12 + l*0.28;
      return { bg:`rgba(243,139,168,${a})`, bd:`rgba(243,139,168,${a+0.3})`, tx:"#f38ba8" };
        } else {
      // A dim, desaturated yellow/gold for draws
      return { bg:"rgba(230, 200, 110, 0.25)", bd:"rgba(230, 200, 110, 0.5)", tx:"#e6c86e" };
    }
  }

  // ── Status ────────────────────────────────────────────────────────
  function setStatus(s) {
    const el  = document.getElementById("status-text");
    const now = new Date().toLocaleTimeString();
    if      (s==="loading") el.textContent = "Loading...";
    else if (s==="cached")  el.textContent = "Cached · refreshing in background";
    else if (s==="error")   el.textContent = "⚠ Could not reach API — showing cached data";
    else                    el.textContent = `Updated ${now} · auto-refreshes every 5 min`;
  }

  // ── Settings ──────────────────────────────────────────────────────
  function openSettings()  { document.getElementById("settings-panel").classList.add("open"); }
  function closeSettings() { document.getElementById("settings-panel").classList.remove("open"); }
  function saveSettings()  {
    API = document.getElementById("workerInput").value.trim().replace(/\/$/,"");
    localStorage.setItem("workerUrl", API);
    closeSettings(); start();
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function weekDays() {
    const now  = new Date();
    const diff = now.getUTCDay()===0 ? -6 : 1-now.getUTCDay();
    const mon  = new Date(now);
    mon.setUTCDate(now.getUTCDate()+diff);
    return Array.from({length:7}, (_,i) => {
      const d = new Date(mon); d.setUTCDate(mon.getUTCDate()+i);
      return d.toISOString().slice(0,10);
    });
  }

  function fmtDate(s) {
    return new Date(s+"T12:00:00Z").toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  }
</script>
