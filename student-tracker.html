<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1e1e2e;
      --surface:   #28283d;
      --surface2:  #313149;
      --border:    #3a3a55;
      --text:      #cdd6f4;
      --subtext:   #6c7086;
      --accent:    #89b4fa;
      --green:     #a6e3a1;
      --green-dim: #243d2e;
      --red:       #f38ba8;
      --today-bg:  #89b4fa;
      --today-fg:  #1e1e2e;
      --radius:    8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cantarell', 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 18px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #topbar h1 { font-size: 14px; font-weight: 700; }
    #topbar .sub { font-size: 11px; color: var(--subtext); margin-top: 1px; }
    .icon-btn {
      background: none; border: none; color: var(--subtext);
      cursor: pointer; padding: 5px; border-radius: 6px; font-size: 15px;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    #app { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 200px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    #sidebar-header {
      padding: 12px 14px 8px; font-size: 10px; font-weight: 700;
      letter-spacing: 1px; color: var(--subtext); text-transform: uppercase;
    }
    #student-list { flex: 1; overflow-y: auto; padding: 0 6px; }
    .student-item {
      display: flex; align-items: center; padding: 7px 8px;
      border-radius: var(--radius); cursor: pointer; gap: 8px;
      transition: background 0.12s; margin-bottom: 2px;
    }
    .student-item:hover { background: var(--surface2); }
    .student-item.active { background: var(--surface2); }
    .student-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--surface2); display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700;
      color: var(--accent); flex-shrink: 0;
    }
    .student-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .student-games { font-size: 10px; color: var(--subtext); flex-shrink: 0; }
    .student-remove {
      background: none; border: none; color: var(--subtext);
      cursor: pointer; font-size: 11px; padding: 2px 3px; border-radius: 3px;
      opacity: 0; transition: opacity 0.1s;
    }
    .student-item:hover .student-remove { opacity: 1; }
    .student-remove:hover { color: var(--red); }
    #add-area { padding: 8px 6px 12px; border-top: 1px solid var(--border); }
    #add-area input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: inherit;
      font-size: 12px; padding: 6px 9px; outline: none;
    }
    #add-area input:focus { border-color: var(--accent); }
    #add-area input::placeholder { color: var(--subtext); }
    #add-btn {
      width: 100%; margin-top: 5px; background: var(--accent);
      color: var(--today-fg); border: none; border-radius: 7px;
      padding: 6px; font-family: inherit; font-size: 12px;
      font-weight: 700; cursor: pointer;
    }
    #add-btn:hover { opacity: 0.85; }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #cal-header {
      display: flex; align-items: center; padding: 11px 20px; gap: 10px;
      flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    #cal-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }
    #cal-subtitle { font-size: 11px; color: var(--subtext); text-align: center; margin-top: 1px; }
    .nav-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); width: 28px; height: 28px; border-radius: 7px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s; flex-shrink: 0;
    }
    .nav-btn:hover { background: var(--border); }

    #overview-view { flex: 1; overflow-y: auto; }
    #month-view { display: none; flex: 1; overflow-y: auto; padding: 14px 20px 20px; }

    /* ── Calendar grid ── */
    .day-headers {
      display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px;
    }
    .day-header {
      text-align: center; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; color: var(--subtext);
      text-transform: uppercase; padding: 3px 0;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

    /* Fixed small cell size */
    .cal-cell {
      height: 52px;
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      transition: background 0.12s; padding: 3px;
      position: relative; overflow: hidden;
    }
    .cal-cell.other-month { background: transparent; border-color: transparent; opacity: 0.25; }
    .cal-cell.future { opacity: 0.35; }
    .cal-cell.has-games {
      background: var(--green-dim); border-color: #3a6a50;
      cursor: pointer;
    }
    .cal-cell.has-games:hover { background: #2c5040; }
    .cal-cell.today .day-num {
      background: var(--today-bg); color: var(--today-fg);
      border-radius: 50%; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .day-num { font-size: 12px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
    .game-count { font-size: 13px; color: var(--green); font-weight: 700; line-height: 1; }
    .game-word { font-size: 9px; color: var(--green); opacity: 0.65; line-height: 1; }
    .game-dots {
      display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center;
    }
    .game-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); opacity: 0.7; }

    /* ── Game popup ── */
    #popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 50;
      align-items: center; justify-content: center;
    }
    #popup-overlay.open { display: flex; }
    #popup {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      width: min(700px, 95vw); max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    #popup h3 { font-size: 14px; margin-bottom: 12px; color: var(--text); flex-shrink: 0; }
    #popup-games {
      display: grid; grid-template-columns: 1fr;
      gap: 4px; overflow-y: auto; flex: 1;
    }
    .game-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 8px; border-radius: 6px;
      background: var(--surface2); font-size: 12px;
      text-decoration: none; color: var(--text);
      transition: background 0.12s; gap: 8px;
    }
    .game-row:hover { background: var(--border); }
    .game-row .players { color: var(--subtext); font-size: 11px; margin-top: 2px; }
    .game-row .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      background: var(--bg); color: var(--subtext); flex-shrink: 0; font-weight: 700;
    }
    .game-row .badge.result-win  { color: var(--green); }
    .game-row .badge.result-loss { color: var(--red); }
    .game-row .badge.result-draw { color: var(--subtext); }
    .popup-close {
      width: 100%; margin-top: 10px; background: var(--surface2);
      color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px; font-family: inherit;
      font-size: 12px; cursor: pointer;
    }
    .popup-close:hover { background: var(--border); }

    /* ── Settings modal ── */
    #settings-panel {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #settings-panel.open { display: flex; }
    .settings-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .settings-box h2 { font-size: 15px; margin-bottom: 4px; }
    .settings-box p { font-size: 12px; color: var(--subtext); margin-bottom: 14px; }
    .settings-box input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: monospace;
      font-size: 12px; padding: 8px 10px; outline: none; margin-bottom: 12px;
    }
    .settings-box input:focus { border-color: var(--accent); }
    .settings-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-primary {
      background: var(--accent); color: var(--today-fg); border: none;
      border-radius: 7px; padding: 7px 16px; font-family: inherit;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-secondary {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 12px; font-family: inherit; font-size: 13px; cursor: pointer;
    }

    #status-bar {
      padding: 4px 18px; font-size: 11px; color: var(--subtext);
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .dot-live {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); margin-right: 5px; animation: pulse 2s infinite;
    }
    .dot-cached {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #f9e2af; margin-right: 5px;
    }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .empty-state { text-align: center; color: var(--subtext); font-size: 13px; margin-top: 50px; }
    .empty-state .big { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div id="topbar">
  <div>
    <h1 id="page-title">♟ Chess Tracker</h1>
    <div class="sub" id="page-sub">This week's activity</div>
  </div>
  <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">Students</div>
    <div id="student-list"></div>
    <div id="add-area">
      <input id="newUser" placeholder="lichess username..." onkeydown="if(event.key==='Enter')addStudent()" />
      <button id="add-btn" onclick="addStudent()">+ Add Student</button>
    </div>
  </div>

  <div id="main">
    <div id="cal-header">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" style="visibility:hidden">‹</button>
      <div style="flex:1;text-align:center">
        <div id="cal-title">This Week</div>
        <div id="cal-subtitle"></div>
      </div>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)" style="visibility:hidden">›</button>
    </div>
    <div id="overview-view"></div>
    <div id="month-view"></div>
  </div>
</div>

<div id="status-bar"><span class="dot-live"></span><span id="status-text">Connecting...</span></div>

<!-- Game popup -->
<div id="popup-overlay" onclick="closePopup(event)">
  <div id="popup">
    <h3 id="popup-title">Games</h3>
    <div id="popup-games"></div>
    <button class="popup-close" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- Settings -->
<div id="settings-panel">
  <div class="settings-box">
    <h2>Worker URL</h2>
    <p>Paste your Cloudflare Worker URL below.</p>
    <input id="workerInput" placeholder="https://your-worker.workers.dev" />
    <div class="settings-actions">
      <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────────────
  const TODAY = new Date().toISOString().slice(0,10);
  const DAY_LABELS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTH_NAMES = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  const WEEK_TTL  = 5 * 60 * 1000;   // 5 min
  const MONTH_TTL = 60 * 60 * 1000;  // 1 hr (past months: effectively forever)

  // ── State ──────────────────────────────────────────────────────
  let API = localStorage.getItem("workerUrl") || "";
  let students = [], weekData = [];
  let currentView = "week";
  let activeStudent = null;
  let calMonth = new Date();
  let refreshTimer = null;

  // Safe game store - avoids JSON-in-HTML-attribute quoting bugs
  const gameStore = {};
  function storeGames(key, games) { gameStore[key] = games; }
  function openStore(key)         { showGamesPopup(gameStore[key] || [], key); }

  // ── Cache helpers ──────────────────────────────────────────────
  function cacheSet(key, value) {
    try {
      localStorage.setItem("cache_" + key, JSON.stringify({ ts: Date.now(), value }));
    } catch {}
  }

  function cacheGet(key, ttl) {
    try {
      const raw = localStorage.getItem("cache_" + key);
      if (!raw) return null;
      const { ts, value } = JSON.parse(raw);
      if (Date.now() - ts > ttl) return null;
      return value;
    } catch { return null; }
  }

  function cacheGetStale(key) {
    // Return cached value even if expired (used as fallback)
    try {
      const raw = localStorage.getItem("cache_" + key);
      if (!raw) return null;
      return JSON.parse(raw).value;
    } catch { return null; }
  }

  // ── Init ───────────────────────────────────────────────────────
  window.onload = () => {
    if (!API) { openSettings(); return; }
    document.getElementById("workerInput").value = API;
    start();
  };

  function start() {
    clearInterval(refreshTimer);
    refresh();
    refreshTimer = setInterval(refresh, WEEK_TTL);
  }

  async function refresh(force = false) {
    if (!API) return;

    // Try cache first
    const cachedStudents = cacheGet("students", WEEK_TTL);
    const cachedWeek     = cacheGet("week", WEEK_TTL);

    if (!force && cachedStudents && cachedWeek) {
      students = cachedStudents;
      weekData = cachedWeek;
      renderSidebar();
      if (currentView === "week") renderOverview();
      setStatus("cached");
      // still refresh in background silently
      fetchAndUpdate();
      return;
    }

    setStatus("loading");
    await fetchAndUpdate();
  }

  async function fetchAndUpdate() {
    try {
      const [sRes, wRes] = await Promise.all([
        fetch(API + "/students"),
        fetch(API + "/week"),
      ]);
      students = await sRes.json();
      weekData = await wRes.json();
      cacheSet("students", students);
      cacheSet("week", weekData);
      renderSidebar();
      if (currentView === "week") renderOverview();
      setStatus("ok");
    } catch {
      // Fall back to stale cache if available
      const staleStudents = cacheGetStale("students");
      const staleWeek     = cacheGetStale("week");
      if (staleStudents) students = staleStudents;
      if (staleWeek)     weekData = staleWeek;
      renderSidebar();
      if (currentView === "week") renderOverview();
      setStatus("error");
    }
  }

  // ── Settings ───────────────────────────────────────────────────
  function openSettings() { document.getElementById("settings-panel").classList.add("open"); }
  function closeSettings() { document.getElementById("settings-panel").classList.remove("open"); }
  function saveSettings() {
    API = document.getElementById("workerInput").value.trim().replace(/\/$/, "");
    localStorage.setItem("workerUrl", API);
    closeSettings();
    start();
  }

  // ── Sidebar ────────────────────────────────────────────────────
  function renderSidebar() {
    const el = document.getElementById("student-list");
    if (!students.length) {
      el.innerHTML = `<div style="padding:10px 8px;font-size:12px;color:var(--subtext)">No students yet.</div>`;
      return;
    }
    const dataByUser = {};
    for (const r of weekData) if (r.username) dataByUser[r.username] = r;

    el.innerHTML = students.map(u => {
      const total = dataByUser[u]?.total || 0;
      return `<div class="student-item ${activeStudent===u?'active':''}" onclick="openStudent('${u}')">
        <div class="student-avatar">${u[0].toUpperCase()}</div>
        <div class="student-name">@${u}</div>
        <div class="student-games">${total > 0 ? total+'♟' : ''}</div>
        <button class="student-remove" onclick="event.stopPropagation();removeStudent('${u}')">✕</button>
      </div>`;
    }).join("");
  }

  // ── Add / Remove ───────────────────────────────────────────────
  async function addStudent() {
    const input = document.getElementById("newUser");
    const username = input.value.trim();
    if (!username || !API) return;
    const res = await fetch(API + "/students", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username }),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    input.value = "";
    localStorage.removeItem("cache_students");
    localStorage.removeItem("cache_week");
    refresh(true);
  }

  async function removeStudent(username) {
    if (!confirm("Remove " + username + "?")) return;
    await fetch(API + "/students/" + username, { method: "DELETE" });
    localStorage.removeItem("cache_students");
    localStorage.removeItem("cache_week");
    if (activeStudent === username) showWeekView();
    else refresh(true);
  }

  // ── Week overview ──────────────────────────────────────────────
  function showWeekView() {
    currentView = "week"; activeStudent = null;
    document.getElementById("overview-view").style.display = "block";
    document.getElementById("month-view").style.display = "none";
    document.getElementById("prev-btn").style.visibility = "hidden";
    document.getElementById("next-btn").style.visibility = "hidden";
    document.getElementById("page-title").textContent = "♟ Chess Tracker";
    document.getElementById("page-sub").textContent = "This week's activity";
    renderSidebar(); renderOverview();
  }

  function renderOverview() {
    const days = getWeekDays();
    const el = document.getElementById("overview-view");
    document.getElementById("cal-title").textContent = "This Week";
    document.getElementById("cal-subtitle").textContent = formatDate(days[0]) + " – " + formatDate(days[6]);

    const dataByUser = {};
    for (const r of weekData) if (r.username) dataByUser[r.username] = r;

    if (!students.length) {
      el.innerHTML = `<div class="empty-state"><div class="big">♟</div>Add students in the sidebar.</div>`;
      return;
    }

    let html = `<div style="padding:12px 18px 8px">
      <div class="day-headers">
        ${days.map(d => {
          const dt = new Date(d + "T12:00:00Z");
          const isToday = d === TODAY;
          return `<div class="day-header" style="${isToday?'color:var(--accent)':''}">
            ${DAY_LABELS[dt.getUTCDay()]}<br>
            <span style="font-size:13px;font-weight:700;letter-spacing:0">${dt.getUTCDate()}</span>
          </div>`;
        }).join("")}
      </div>
      <div class="cal-grid">`;

    for (const d of days) {
      const isFuture = d > TODAY;
      const isToday  = d === TODAY;
      const dt = new Date(d + "T12:00:00Z");

      // Collect all games across all students for this day
      const allGames = [];
      for (const u of students) {
        const dayGames = dataByUser[u]?.days?.[d] || [];
        for (const g of dayGames) allGames.push({ ...g, username: u });
      }
      const count = allGames.length;
      const hasGames = count > 0 && !isFuture;
      const cls = ["cal-cell", hasGames?"has-games":"", isToday?"today":"", isFuture?"future":""].filter(Boolean).join(" ");
      if (hasGames) storeGames(d, allGames);
      const onclick = hasGames ? `onclick="openStore('${d}')"` : "";

      html += `<div class="${cls}" ${onclick}>
        <div class="day-num">${dt.getUTCDate()}</div>`;
      if (hasGames) {
        const dots = Math.min(count, 5);
        html += `<div class="game-count">${count}</div>
          <div class="game-word">${count===1?'game':'games'}</div>
          <div class="game-dots">${Array(dots).fill(`<div class="game-dot"></div>`).join("")}</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
    el.innerHTML = html;
  }

  // ── Student month view ─────────────────────────────────────────
  async function openStudent(username) {
    currentView = "month"; activeStudent = username;
    calMonth = new Date(); calMonth.setDate(1);
    document.getElementById("overview-view").style.display = "none";
    document.getElementById("month-view").style.display = "block";
    document.getElementById("prev-btn").style.visibility = "visible";
    document.getElementById("next-btn").style.visibility = "visible";
    document.getElementById("page-title").textContent = "@" + username;
    document.getElementById("page-sub").textContent = "Monthly activity";
    renderSidebar();
    await loadAndRenderMonth(username);
  }

  async function navigate(dir) {
    if (currentView !== "month" || !activeStudent) return;
    calMonth.setMonth(calMonth.getMonth() + dir);
    await loadAndRenderMonth(activeStudent);
  }

  async function loadAndRenderMonth(username) {
    const el = document.getElementById("month-view");
    const year = calMonth.getFullYear(), month = calMonth.getMonth();
    document.getElementById("cal-title").textContent = MONTH_NAMES[month] + " " + year;
    document.getElementById("cal-subtitle").textContent = "@" + username;

    const isPast = (year < new Date().getFullYear()) ||
                   (year === new Date().getFullYear() && month < new Date().getMonth());
    const cacheKey = `month_${username}_${year}_${month}`;
    const ttl = isPast ? 24 * 60 * 60 * 1000 : MONTH_TTL;

    // Check cache
    const cached = cacheGet(cacheKey, ttl);
    if (cached) {
      renderMonthGrid(username, cached);
      setStatus("cached");
      return;
    }

    el.innerHTML = `<div style="color:var(--subtext);text-align:center;padding:40px;font-size:13px">Loading...</div>`;

    const since = new Date(Date.UTC(year, month, 1)).getTime();
    const until = new Date(Date.UTC(year, month + 1, 1)).getTime();

    // dayGames: { "YYYY-MM-DD": [ {id, url, speed, winner, white, black}, ... ] }
    const dayGames = {};

    try {
      const res = await fetch(
        `https://lichess.org/api/games/user/${username}?since=${since}&until=${until}&moves=false&clocks=false&evals=false&max=500`,
        { headers: { Accept: "application/x-ndjson" } }
      );
      const text = await res.text();
      for (const line of text.trim().split("\n").filter(Boolean)) {
        try {
          const g = JSON.parse(line);
          const ts = g.lastMoveAt || g.createdAt;
          if (!ts) continue;
          const d = new Date(ts).toISOString().slice(0, 10);
          if (!dayGames[d]) dayGames[d] = [];
          const white = g.players?.white?.user?.name || "?";
          const black = g.players?.black?.user?.name || "?";
          const playerColor = white.toLowerCase() === username.toLowerCase() ? "white" : "black";
          const opponent = playerColor === "white" ? black : white;
          const result = !g.winner ? "draw" : g.winner === playerColor ? "win" : "loss";
          dayGames[d].push({
            id:       g.id,
            url:      `https://lichess.org/${g.id}`,
            speed:    g.speed || "?",
            color:    playerColor,
            result,
            opponent,
            username,
          });
        } catch {}
      }
      cacheSet(cacheKey, dayGames);
    } catch {
      const stale = cacheGetStale(cacheKey);
      if (stale) {
        renderMonthGrid(username, stale);
        setStatus("error");
        return;
      }
      el.innerHTML = `<div style="color:var(--subtext);text-align:center;padding:40px">Could not reach lichess.</div>`;
      return;
    }

    renderMonthGrid(username, dayGames);
    setStatus("ok");
  }

  function renderMonthGrid(username, dayGames) {
    const el = document.getElementById("month-view");
    const year = calMonth.getFullYear(), month = calMonth.getMonth();
    const firstDay = new Date(Date.UTC(year, month, 1)).getUTCDay();
    const daysInMonth = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();
    const prevMonthDays = new Date(Date.UTC(year, month, 0)).getUTCDate();
    const totalGames = Object.values(dayGames).flat().length;
    const daysPlayed = Object.keys(dayGames).length;

    let html = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <a href="https://lichess.org/@/${username}" target="_blank"
           style="color:var(--accent);font-size:12px;text-decoration:none">Open on Lichess ↗</a>
        <div style="font-size:11px;color:var(--subtext)">
          ${totalGames} games · ${daysPlayed} active days
        </div>
      </div>
      <div class="day-headers">
        ${DAY_LABELS.map(d=>`<div class="day-header">${d}</div>`).join("")}
      </div>
      <div class="cal-grid">`;

    for (let i = 0; i < firstDay; i++) {
      html += `<div class="cal-cell other-month"><div class="day-num">${prevMonthDays - firstDay + 1 + i}</div></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const games   = dayGames[dateStr] || [];
      const count   = games.length;
      const isToday  = dateStr === TODAY;
      const isFuture = dateStr > TODAY;
      const hasGames = count > 0;
      const cls = ["cal-cell", hasGames?"has-games":"", isToday?"today":"", isFuture?"future":""].filter(Boolean).join(" ");
      if (hasGames) storeGames(dateStr, games);
      const onclick = hasGames ? `onclick="openStore('${dateStr}')"` : "";

      html += `<div class="${cls}" ${onclick}>
        <div class="day-num">${d}</div>`;
      if (hasGames) {
        const dots = Math.min(count, 5);
        html += `<div class="game-count">${count}</div>
          <div class="game-word">${count===1?'game':'games'}</div>
          <div class="game-dots">${Array(dots).fill(`<div class="game-dot"></div>`).join("")}</div>`;
      }
      html += `</div>`;
    }

    const trailing = 7 - ((firstDay + daysInMonth) % 7);
    if (trailing < 7) for (let d = 1; d <= trailing; d++) {
      html += `<div class="cal-cell other-month"><div class="day-num">${d}</div></div>`;
    }

    html += `</div>`;
    el.innerHTML = html;
  }

  // ── Game popup ─────────────────────────────────────────────────
  function showGamesPopup(games, dateStr) {
    document.getElementById("popup-title").textContent =
      "Games on " + new Date(dateStr + "T12:00:00Z").toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"});

    const cols = games.length > 4 ? 2 : 1;
    document.getElementById("popup-games").style.gridTemplateColumns = cols > 1 ? "1fr 1fr" : "1fr";
    document.getElementById("popup-games").innerHTML = games.map(g => {
      const colorIcon  = g.color === "white" ? "♔" : "♚";
      const colorLabel = g.color === "white" ? "White" : "Black";
      const resultLabel = g.result === "win" ? "Win" : g.result === "loss" ? "Loss" : "Draw";
      const resultClass = g.result === "win" ? "result-win" : g.result === "loss" ? "result-loss" : "result-draw";
      const opponent = g.opponent || (g.color === "white" ? g.black : g.white) || "?";
      const player = g.username ? `<span style="color:var(--accent)">@${g.username}</span>` : "";
      return `<a href="${g.url}" target="_blank" class="game-row">
        <div style="min-width:0">
          <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${player} vs ${opponent}</div>
          <div class="players">${colorIcon} ${colorLabel} · ${g.speed}</div>
        </div>
        <div class="badge ${resultClass}" style="flex-shrink:0">${resultLabel}</div>
      </a>`;
    }).join("");

    document.getElementById("popup-overlay").classList.add("open");
  }

  function closePopup(e) {
    if (!e || e.target === document.getElementById("popup-overlay")) {
      document.getElementById("popup-overlay").classList.remove("open");
    }
  }

  // ── Helpers ────────────────────────────────────────────────────
  function getWeekDays() {
    const now = new Date();
    const diff = now.getUTCDay() === 0 ? -6 : 1 - now.getUTCDay();
    const mon = new Date(now);
    mon.setUTCDate(now.getUTCDate() + diff);
    return Array.from({length:7}, (_,i) => {
      const d = new Date(mon);
      d.setUTCDate(mon.getUTCDate() + i);
      return d.toISOString().slice(0,10);
    });
  }

  function formatDate(str) {
    return new Date(str + "T12:00:00Z").toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  }

  function setStatus(state) {
    const el = document.getElementById("status-text");
    const dot = document.querySelector("#status-bar span:first-child");
    const now = new Date().toLocaleTimeString();
    if (state === "loading") {
      el.textContent = "Loading...";
    } else if (state === "cached") {
      dot.className = "dot-cached";
      el.textContent = `Showing cached data · refreshing in background`;
    } else if (state === "error") {
      el.textContent = "⚠ Could not reach API — showing cached data";
    } else {
      dot.className = "dot-live";
      el.textContent = `Updated ${now} · refreshes every 5 min`;
    }
  }

  // Settings
  function openSettings() { document.getElementById("settings-panel").classList.add("open"); }
  function closeSettings() { document.getElementById("settings-panel").classList.remove("open"); }
  function saveSettings() {
    API = document.getElementById("workerInput").value.trim().replace(/\/$/, "");
    localStorage.setItem("workerUrl", API);
    closeSettings();
    start();
  }
</script>
</body>
</html>
