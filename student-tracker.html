<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lichess Weekly Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: monospace;
      background: #0e0e0e;
      color: #ccc;
      margin: 0;
      padding: 30px 20px;
    }
    h1 { color: #a0c4ff; margin-bottom: 2px; font-size: 20px; }
    .sub { color: #444; font-size: 12px; margin-bottom: 24px; }

    #setup {
      background: #161616;
      border: 1px solid #2a2a2a;
      padding: 12px 16px;
      margin-bottom: 20px;
      max-width: 600px;
    }
    #setup label { color: #666; font-size: 12px; }
    #setup input {
      background: #0e0e0e;
      color: #eee;
      border: 1px solid #333;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 13px;
      width: 320px;
      margin-top: 4px;
    }

    #add-row { display: flex; gap: 8px; margin-bottom: 20px; max-width: 600px; }
    #add-row input {
      flex: 1;
      background: #0e0e0e;
      color: #eee;
      border: 1px solid #333;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 13px;
    }

    button {
      background: #1e1e1e;
      color: #aaa;
      border: 1px solid #333;
      padding: 5px 12px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      white-space: nowrap;
    }
    button:hover { background: #2a2a2a; color: #fff; }

    /* Calendar */
    #calendar { max-width: 860px; }
    #calendar h2 { font-size: 13px; color: #555; margin-bottom: 12px; font-weight: normal; }

    .cal-table { width: 100%; border-collapse: collapse; }

    .cal-table th {
      font-size: 11px;
      color: #444;
      text-align: center;
      padding: 4px 6px;
      font-weight: normal;
    }
    .cal-table th.name-col { text-align: left; width: 140px; }

    .cal-table td { padding: 4px 6px; }
    .cal-table td.name-cell {
      font-size: 13px;
    }
    .cal-table td.name-cell a { color: #a0c4ff; text-decoration: none; }
    .cal-table td.name-cell a:hover { text-decoration: underline; }
    .cal-table td.name-cell .remove-btn {
      font-size: 10px;
      color: #333;
      border-color: #222;
      padding: 1px 5px;
      margin-left: 6px;
    }
    .cal-table td.name-cell .remove-btn:hover { color: #f88; border-color: #633; background: #1a0a0a; }

    .day-cell {
      text-align: center;
      border-radius: 4px;
      font-size: 12px;
      min-width: 68px;
      height: 36px;
      vertical-align: middle;
      position: relative;
    }

    /* colour scale by game count */
    .day-cell[data-count="0"]  { background: #161616; color: #333; }
    .day-cell[data-count="1"]  { background: #1a3a1a; color: #5a9a5a; }
    .day-cell[data-count="2"]  { background: #1e4a1e; color: #6db86d; }
    .day-cell[data-count="3"]  { background: #1f5a1f; color: #7dcf7d; }
    .day-cell[data-count="4"]  { background: #1f6e1f; color: #8de08d; }
    .day-cell[data-count="5+"] { background: #207f20; color: #a0f0a0; }

    .day-cell.today { outline: 1px solid #4a8a4a; }
    .day-cell.future { opacity: 0.3; }

    .count-label { font-size: 15px; font-weight: bold; display: block; }
    .games-word  { font-size: 10px; opacity: 0.7; }

    .total-cell {
      text-align: center;
      font-size: 13px;
      color: #666;
      padding-left: 10px;
      border-left: 1px solid #1e1e1e;
    }
    .total-cell b { color: #a0c4ff; }

    #status { font-size: 12px; color: #444; margin-bottom: 12px; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4caf50; margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    #no-students { color: #333; font-size: 13px; }
  </style>
</head>
<body>

<h1>♟ Lichess Weekly Tracker</h1>
<div class="sub">Games played this week, per student.</div>

<div id="setup">
  <label>Cloudflare Worker URL</label><br>
  <input id="workerUrl" placeholder="https://your-worker.workers.dev" />
  <button onclick="saveUrl()" style="margin-left:6px">Save</button>
</div>

<div id="add-row">
  <input id="newUser" placeholder="Add student (lichess username)..." onkeydown="if(event.key==='Enter')addStudent()" />
  <button onclick="addStudent()">Add Student</button>
</div>

<div id="status"></div>
<div id="calendar"></div>

<script>
  let API = localStorage.getItem("workerUrl") || "";
  let refreshTimer = null;

  if (API) {
    document.getElementById("workerUrl").value = API;
    init();
  }

  function saveUrl() {
    API = document.getElementById("workerUrl").value.trim().replace(/\/$/, "");
    localStorage.setItem("workerUrl", API);
    init();
  }

  function init() {
    clearInterval(refreshTimer);
    refresh();
    refreshTimer = setInterval(refresh, 5 * 60 * 1000); // every 5 min
  }

  async function refresh() {
    if (!API) return;
    setStatus("loading");

    const [studRes, weekRes] = await Promise.all([
      fetch(API + "/students").catch(() => null),
      fetch(API + "/week").catch(() => null),
    ]);

    if (!studRes || !weekRes) {
      setStatus("error");
      return;
    }

    const students = await studRes.json();
    const weekData = await weekRes.json();

    renderCalendar(students, weekData);
    setStatus("ok");
  }

  // ── Date helpers ──────────────────────────────────────────────

  function getMondayOfWeek() {
    const now = new Date();
    const day = now.getUTCDay();
    const diff = day === 0 ? -6 : 1 - day;
    const mon = new Date(now);
    mon.setUTCDate(now.getUTCDate() + diff);
    return mon;
  }

  function getWeekDays() {
    const mon = getMondayOfWeek();
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon);
      d.setUTCDate(mon.getUTCDate() + i);
      days.push(d.toISOString().slice(0, 10));
    }
    return days;
  }

  const DAY_LABELS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const TODAY = new Date().toISOString().slice(0, 10);

  // ── Render ────────────────────────────────────────────────────

  function renderCalendar(students, weekData) {
    const el = document.getElementById("calendar");

    if (!students.length) {
      el.innerHTML = "<p id='no-students'>Add a student above to get started.</p>";
      return;
    }

    const days = getWeekDays();
    const dataByUser = {};
    for (const row of weekData) {
      if (row.username) dataByUser[row.username] = row;
    }

    // Header row
    let html = `
      <h2>Week of ${days[0]} — ${days[6]}</h2>
      <table class="cal-table">
        <thead>
          <tr>
            <th class="name-col">Student</th>
            ${days.map((d, i) => {
              const label = DAY_LABELS[i];
              const dayNum = parseInt(d.slice(8), 10);
              return `<th>${label}<br><span style="color:#333">${dayNum}</span></th>`;
            }).join("")}
            <th style="padding-left:10px;color:#333;font-weight:normal">Total</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (const username of students) {
      const data = dataByUser[username] || { days: {}, total: 0 };
      const total = data.total || 0;

      html += `<tr>
        <td class="name-cell">
          <a href="https://lichess.org/@/${username}" target="_blank">@${username}</a>
          <button class="remove-btn" onclick="removeStudent('${username}')">✕</button>
        </td>`;

      for (const date of days) {
        const count = (data.days && data.days[date]) || 0;
        const isFuture = date > TODAY;
        const isToday = date === TODAY;
        const bucket = count === 0 ? "0" : count === 1 ? "1" : count === 2 ? "2" : count === 3 ? "3" : count === 4 ? "4" : "5+";
        const cls = ["day-cell", isToday ? "today" : "", isFuture ? "future" : ""].join(" ").trim();

        html += `<td class="${cls}" data-count="${bucket}">`;
        if (!isFuture) {
          html += count > 0
            ? `<span class="count-label">${count}</span><span class="games-word">${count === 1 ? "game" : "games"}</span>`
            : `<span class="count-label" style="font-size:18px">–</span>`;
        }
        html += `</td>`;
      }

      html += `<td class="total-cell"><b>${total}</b><br><span style="font-size:10px">games</span></td>`;
      html += `</tr>`;
    }

    html += `</tbody></table>`;
    el.innerHTML = html;
  }

  // ── Student management ────────────────────────────────────────

  async function addStudent() {
    const input = document.getElementById("newUser");
    const username = input.value.trim();
    if (!username || !API) return;

    const res = await fetch(API + "/students", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username }),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    input.value = "";
    refresh();
  }

  async function removeStudent(username) {
    if (!confirm("Remove " + username + "?")) return;
    await fetch(API + "/students/" + username, { method: "DELETE" });
    refresh();
  }

  // ── Status ────────────────────────────────────────────────────

  function setStatus(state) {
    const el = document.getElementById("status");
    const now = new Date().toLocaleTimeString();
    if (state === "loading") {
      el.innerHTML = `<span class="dot"></span>Loading...`;
    } else if (state === "error") {
      el.innerHTML = `⚠️ Could not reach worker. Check the URL above.`;
    } else {
      el.innerHTML = `<span class="dot"></span>Updated at ${now} · refreshes every 5 min`;
    }
  }
</script>
</body>
</html>
